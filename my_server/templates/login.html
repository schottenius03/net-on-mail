{% extends 'base.html' %}

{% block title %}Logga in{% endblock %}

{% block headline %}{% endblock %}

{% block content %}
    <form action = "{{ url_for('login')}}" method = "post" autocomplete="off" class="form_login">
        <section id="sec_login">
            <h3 class="txt_login">Logga in</h3>
            {% for category, message in get_flashed_messages(with_categories=True) %}
                <div class="alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            <p><input type = "text" name = "username" placeholder="Användarnamn"/></p>
            <p><input type = "password" name = "password" placeholder="Lösenord"/></p>
            <p><a href=" {{url_for('note')}}">Glömt lösenord</a> eller <a href=" {{url_for('new_account')}}">ny användare?</a></p>
            <p><input type = "submit" value = "Logga in" /></p>
        </section>
    </form>
{% endblock %}
